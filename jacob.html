<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Rivalry — Jacob</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav>
  <a class="nav-brand" href="../index.html">⚔ THE RIVALRY</a>
  <ul class="nav-links">
    <li><a href="../index.html">Arena</a></li>
    <li><a href="jacob.html" id="nav-jacob" class="jacob-link">Jacob</a></li>
    <li><a href="gabby.html" id="nav-gabby" class="gabby-link">Gabby</a></li>
    <li><a href="history.html" id="nav-history">History</a></li>
  </ul>
</nav>

<div class="page" id="app">
  <div class="spinner"></div>
</div>

<!-- GOAL MODAL -->
<div class="modal-overlay" id="goal-modal">
  <div class="modal">
    <div class="modal-title" style="color: var(--jacob)">Set This Week's Goals</div>
    <div class="input-group">
      <label>Goal 1</label>
      <input type="text" id="goal-1-input" placeholder="e.g. No sugar M–F" maxlength="80">
    </div>
    <div class="input-group">
      <label>Goal 2</label>
      <input type="text" id="goal-2-input" placeholder="e.g. Workout every day" maxlength="80">
    </div>
    <div class="flex gap-2 mt-3">
      <button class="btn btn-jacob" id="save-goals-btn" style="flex:1">Save Goals</button>
      <button class="btn btn-outline" id="close-modal-btn">Cancel</button>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<script>
setActive('#nav-jacob');
const PLAYER = 'jacob';
const monday = getMondayOfWeek();
const weekStart = toISO(monday);
const weekDates = getWeekDates(monday);

let currentGoals = null;
let currentCheckins = [];

async function render() {
  const app = document.getElementById('app');
  const [goals, checkins, results] = await Promise.all([
    getWeekGoals(PLAYER, weekStart),
    getCheckins(PLAYER, weekStart),
    getWeeklyResults(20)
  ]);

  currentGoals = goals;
  currentCheckins = checkins;

  const weekScore = computeWeekScore(checkins);
  const checkinMap = {};
  checkins.forEach(c => { checkinMap[c.checkin_date] = c; });

  // All-time stats for jacob
  const jacobWins = results.filter(r => r.winner === 'jacob').length;
  const jacobLosses = results.filter(r => r.winner === 'gabby').length;
  const ties = results.filter(r => r.winner === 'tie').length;

  // Streak
  const streak = calcStreak(results, 'jacob');

  app.innerHTML = `
    <!-- HEADER -->
    <div style="display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:1rem; margin-bottom:2.5rem;">
      <div>
        <div class="hero-stat" style="color: var(--jacob)">JACOB</div>
        <div class="text-muted mt-1">Week of ${formatWeekRange(weekStart)}</div>
      </div>
      <div style="text-align:right;">
        <div style="font-family:'Space Mono',monospace; font-size:2rem; font-weight:700;">
          <span style="color:var(--win)">${jacobWins}</span><span style="color:var(--muted)">-</span><span style="color:var(--lose)">${jacobLosses}</span>${ties > 0 ? `<span style="color:var(--muted); font-size:1.2rem;">-${ties}T</span>` : ''}
        </div>
        <div class="text-muted" style="font-size:0.8rem;">All-time record</div>
        ${streak > 0 ? `<div class="mt-1"><span class="streak-flame">🔥</span> <span style="font-size:0.85rem; font-weight:600;">${streak}-week win streak</span></div>` : ''}
      </div>
    </div>

    <!-- THIS WEEK SCORE -->
    <div class="card jacob-card mb-3" style="display:flex; align-items:center; justify-content:space-between;">
      <div>
        <div class="section-title">This Week's Score</div>
        <div style="font-family:'Anton',sans-serif; font-size:3rem; color:var(--jacob); line-height:1;">${weekScore}<span style="color:var(--muted); font-size:1.5rem;">/10</span></div>
      </div>
      <div style="text-align:right;">
        <div class="text-muted" style="font-size:0.8rem; margin-bottom:0.25rem;">${Math.round((weekScore/10)*100)}% complete</div>
        <div class="progress-bar" style="width:140px;">
          <div class="progress-fill jacob" style="width:${(weekScore/10)*100}%"></div>
        </div>
      </div>
    </div>

    <!-- GOALS SECTION -->
    <div class="flex-between mb-2">
      <div class="section-title mb-0">Weekly Goals</div>
      <button class="btn btn-jacob" id="edit-goals-btn" style="font-size:0.8rem; padding:0.4rem 0.9rem;">
        ${goals ? '✎ Edit Goals' : '+ Set Goals'}
      </button>
    </div>

    ${goals ? `
      <div class="grid-2 mb-4">
        ${renderGoalCard(1, goals.goal_1, checkins, checkinMap)}
        ${renderGoalCard(2, goals.goal_2, checkins, checkinMap)}
      </div>
    ` : `
      <div class="card mb-4" style="text-align:center; padding:2.5rem; border-style:dashed;">
        <div style="font-size:2rem; margin-bottom:0.5rem;">🎯</div>
        <div style="font-weight:600; margin-bottom:0.5rem;">No goals set for this week</div>
        <div class="text-muted text-sm mb-2">Set 2 goals to start tracking your week</div>
        <button class="btn btn-jacob" id="edit-goals-btn-empty">+ Set Goals</button>
      </div>
    `}

    <!-- DAILY CHECKINS -->
    ${goals ? `
      <div class="section-title">Daily Check-ins</div>
      <div class="card">
        ${renderDailyCheckins(checkinMap, goals)}
      </div>
    ` : ''}

    <!-- RECENT WEEKS -->
    ${results.length > 0 ? `
      <div class="section-title mt-4">Recent Weeks</div>
      <div class="card" style="overflow:auto;">
        <table class="history-table">
          <thead>
            <tr>
              <th>Week</th>
              <th>Score</th>
              <th>Result</th>
            </tr>
          </thead>
          <tbody>
            ${results.map(r => `
              <tr>
                <td class="text-muted">${formatWeekRange(r.week_start)}</td>
                <td class="text-mono">${r.jacob_score}–${r.gabby_score}</td>
                <td><span class="badge ${r.winner}">${r.winner === 'jacob' ? 'Win 🏆' : r.winner === 'tie' ? 'Tie' : 'Loss'}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    ` : ''}
  `;

  bindEvents(goals);
}

function renderGoalCard(num, text, checkins, checkinMap) {
  const key = `goal_${num}_done`;
  const doneCount = checkins.filter(c => c[key]).length;
  const pct = Math.round((doneCount / 5) * 100);

  return `
    <div class="card jacob-card">
      <div class="text-muted mb-1" style="font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase;">Goal ${num}</div>
      <div style="font-weight:600; font-size:0.95rem; margin-bottom:0.75rem;">${text}</div>
      <div class="progress-bar">
        <div class="progress-fill jacob" style="width:${pct}%"></div>
      </div>
      <div class="text-muted mt-1" style="font-size:0.8rem;">${doneCount}/5 days</div>
    </div>
  `;
}

function renderDailyCheckins(checkinMap, goals) {
  return weekDates.map((date, i) => {
    const dateStr = toISO(date);
    const c = checkinMap[dateStr];
    const future = isFuture(date);
    const today = isToday(date);
    const g1 = c?.goal_1_done || false;
    const g2 = c?.goal_2_done || false;

    return `
      <div style="display:flex; align-items:center; gap:1rem; padding:0.85rem 0; border-bottom: 1px solid var(--border); ${i === 4 ? 'border-bottom:none' : ''}; opacity:${future ? 0.4 : 1};">
        <div style="width:44px; text-align:center; flex-shrink:0;">
          <div style="font-family:'Anton',sans-serif; font-size:1rem; color:${today ? 'var(--jacob)' : 'var(--muted)'};">${DAY_LABELS[i]}</div>
          <div class="text-muted" style="font-size:0.7rem;">${formatDate(dateStr)}</div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; gap:0.5rem;">
          <div style="display:flex; align-items:center; gap:0.75rem; ${future ? 'pointer-events:none' : ''}">
            <button class="check-toggle ${!future && g1 ? 'checked-jacob' : ''}" data-date="${dateStr}" data-goal="1" ${future ? 'disabled' : ''}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M2 7l4 4 6-6" stroke="white" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
            <span style="font-size:0.9rem;">${goals.goal_1}</span>
          </div>
          <div style="display:flex; align-items:center; gap:0.75rem; ${future ? 'pointer-events:none' : ''}">
            <button class="check-toggle ${!future && g2 ? 'checked-jacob' : ''}" data-date="${dateStr}" data-goal="2" ${future ? 'disabled' : ''}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M2 7l4 4 6-6" stroke="white" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
            <span style="font-size:0.9rem;">${goals.goal_2}</span>
          </div>
        </div>
        <div style="font-family:'Space Mono',monospace; font-size:1rem; color:${g1&&g2?'var(--jacob)':g1||g2?'var(--gold)':'var(--muted)'}; font-weight:700; flex-shrink:0;">
          ${future ? '—' : (g1?1:0)+(g2?1:0)+'/2'}
        </div>
      </div>
    `;
  }).join('');
}

function bindEvents(goals) {
  // Edit goals button
  const editBtn = document.getElementById('edit-goals-btn') || document.getElementById('edit-goals-btn-empty');
  if (editBtn) {
    editBtn.addEventListener('click', () => {
      if (goals) {
        document.getElementById('goal-1-input').value = goals.goal_1;
        document.getElementById('goal-2-input').value = goals.goal_2;
      }
      document.getElementById('goal-modal').classList.add('open');
    });
  }

  // Close modal
  document.getElementById('close-modal-btn').addEventListener('click', () => {
    document.getElementById('goal-modal').classList.remove('open');
  });

  // Save goals
  document.getElementById('save-goals-btn').addEventListener('click', async () => {
    const g1 = document.getElementById('goal-1-input').value.trim();
    const g2 = document.getElementById('goal-2-input').value.trim();
    if (!g1 || !g2) { showToast('Enter both goals!'); return; }
    const btn = document.getElementById('save-goals-btn');
    btn.textContent = 'Saving…';
    btn.disabled = true;
    const { error } = await setWeekGoals(PLAYER, weekStart, g1, g2);
    if (error) { showToast('Error saving'); }
    else {
      document.getElementById('goal-modal').classList.remove('open');
      showToast('Goals saved! 🎯');
      render();
    }
  });

  // Check toggles
  document.querySelectorAll('.check-toggle').forEach(btn => {
    btn.addEventListener('click', async () => {
      const date = btn.dataset.date;
      const goalNum = parseInt(btn.dataset.goal);
      const existing = currentCheckins.find(c => c.checkin_date === date);
      const g1 = goalNum === 1 ? !btn.classList.contains('checked-jacob') : (existing?.goal_1_done || false);
      const g2 = goalNum === 2 ? !btn.classList.contains('checked-jacob') : (existing?.goal_2_done || false);

      btn.style.opacity = '0.5';
      const { error } = await upsertCheckin(PLAYER, weekStart, date, g1, g2);
      if (error) { showToast('Error saving'); btn.style.opacity = '1'; return; }

      // Optimistic update
      if (!currentCheckins.find(c => c.checkin_date === date)) {
        currentCheckins.push({ checkin_date: date, week_start: weekStart, goal_1_done: g1, goal_2_done: g2 });
      } else {
        const idx = currentCheckins.findIndex(c => c.checkin_date === date);
        currentCheckins[idx] = { ...currentCheckins[idx], goal_1_done: g1, goal_2_done: g2 };
      }
      render();
    });
  });
}

function calcStreak(results, player) {
  let streak = 0;
  for (const r of results) {
    if (r.winner === player) streak++;
    else break;
  }
  return streak;
}

render();
</script>
</body>
</html>
