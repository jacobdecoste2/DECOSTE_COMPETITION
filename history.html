<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Rivalry — History</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav>
  <a class="nav-brand" href="../index.html">⚔ THE RIVALRY</a>
  <ul class="nav-links">
    <li><a href="../index.html">Arena</a></li>
    <li><a href="jacob.html" id="nav-jacob" class="jacob-link">Jacob</a></li>
    <li><a href="gabby.html" id="nav-gabby" class="gabby-link">Gabby</a></li>
    <li><a href="history.html" id="nav-history">History</a></li>
  </ul>
</nav>

<div class="page" id="app">
  <div class="spinner"></div>
</div>

<script src="../js/config.js"></script>
<script>
setActive('#nav-history');

async function render() {
  const app = document.getElementById('app');
  const [results, allTime] = await Promise.all([
    getWeeklyResults(100),
    getAllTimeRecord()
  ]);

  const totalGames = allTime.jacob + allTime.gabby + allTime.tie;

  // Dominance percentage
  const jacobPct = totalGames > 0 ? Math.round((allTime.jacob / totalGames) * 100) : 50;
  const gabbyPct = totalGames > 0 ? Math.round((allTime.gabby / totalGames) * 100) : 50;

  // Longest streaks from results
  const { jacobStreak, gabbyStreak } = calcLongestStreaks(results);

  // Avg scores
  const jacobAvg = results.length > 0
    ? (results.reduce((s, r) => s + r.jacob_score, 0) / results.length).toFixed(1) : '—';
  const gabbyAvg = results.length > 0
    ? (results.reduce((s, r) => s + r.gabby_score, 0) / results.length).toFixed(1) : '—';

  // Current winning streak
  const jacobCurrentStreak = calcCurrentStreak(results, 'jacob');
  const gabbyCurrentStreak = calcCurrentStreak(results, 'gabby');

  app.innerHTML = `
    <!-- HEADER -->
    <div style="margin-bottom:2.5rem;">
      <div class="hero-stat" style="font-size: clamp(3rem,10vw,7rem);">HISTORY</div>
      <div class="text-muted mt-1">${totalGames} week${totalGames !== 1 ? 's' : ''} in the books</div>
    </div>

    <!-- ALL TIME RECORD -->
    <div class="card mb-4" style="text-align:center; padding: 2.5rem;">
      <div class="section-title">All-Time Record</div>
      <div style="display:flex; align-items:center; justify-content:center; gap:1.5rem; flex-wrap:wrap; margin: 1rem 0;">
        <div>
          <div style="font-family:'Anton',sans-serif; font-size:4rem; color:var(--jacob); line-height:1;">${allTime.jacob}</div>
          <div style="color:var(--jacob); font-weight:600; font-size:0.9rem; letter-spacing:0.05em;">JACOB</div>
        </div>
        <div style="font-family:'Anton',sans-serif; font-size:3rem; color:var(--muted);">—</div>
        <div>
          <div style="font-family:'Anton',sans-serif; font-size:4rem; color:var(--gabby); line-height:1;">${allTime.gabby}</div>
          <div style="color:var(--gabby); font-weight:600; font-size:0.9rem; letter-spacing:0.05em;">GABBY</div>
        </div>
        ${allTime.tie > 0 ? `
          <div>
            <div style="font-family:'Anton',sans-serif; font-size:4rem; color:var(--gold); line-height:1;">${allTime.tie}</div>
            <div style="color:var(--gold); font-weight:600; font-size:0.9rem; letter-spacing:0.05em;">TIES</div>
          </div>
        ` : ''}
      </div>

      <!-- Dominance bar -->
      ${totalGames > 0 ? `
        <div class="text-muted mb-1" style="font-size:0.75rem; letter-spacing:0.08em; text-transform:uppercase;">Win Share</div>
        <div style="display:flex; height:12px; border-radius:999px; overflow:hidden; gap:2px;">
          <div style="width:${jacobPct}%; background:var(--jacob); border-radius:999px 0 0 999px; transition:width 0.8s ease;"></div>
          <div style="width:${gabbyPct}%; background:var(--gabby); border-radius:0 999px 999px 0; transition:width 0.8s ease;"></div>
        </div>
        <div style="display:flex; justify-content:space-between; margin-top:0.5rem;">
          <span style="color:var(--jacob); font-size:0.8rem; font-weight:600;">${jacobPct}%</span>
          <span style="color:var(--gabby); font-size:0.8rem; font-weight:600;">${gabbyPct}%</span>
        </div>
      ` : '<div class="text-muted">No completed weeks yet</div>'}
    </div>

    <!-- STAT GRID -->
    <div class="grid-2 mb-4">
      <div class="card jacob-card" style="text-align:center;">
        <div class="section-title" style="color:var(--jacob);">Jacob Stats</div>
        <div style="display:flex; justify-content:space-around; margin-top:1rem; flex-wrap:wrap; gap:1rem;">
          <div>
            <div style="font-family:'Anton',sans-serif; font-size:2rem; color:var(--jacob);">${jacobAvg}</div>
            <div class="text-muted" style="font-size:0.75rem; text-transform:uppercase; letter-spacing:0.08em;">Avg Score</div>
          </div>
          <div>
            <div style="font-family:'Anton',sans-serif; font-size:2rem; color:var(--jacob);">${jacobStreak}</div>
            <div class="text-muted" style="font-size:0.75rem; text-transform:uppercase; letter-spacing:0.08em;">Best Streak</div>
          </div>
          <div>
            <div style="font-family:'Anton',sans-serif; font-size:2rem; color:var(--jacob);">${jacobCurrentStreak > 0 ? jacobCurrentStreak : '—'}</div>
            <div class="text-muted" style="font-size:0.75rem; text-transform:uppercase; letter-spacing:0.08em;">Current Run</div>
          </div>
        </div>
      </div>

      <div class="card gabby-card" style="text-align:center;">
        <div class="section-title" style="color:var(--gabby);">Gabby Stats</div>
        <div style="display:flex; justify-content:space-around; margin-top:1rem; flex-wrap:wrap; gap:1rem;">
          <div>
            <div style="font-family:'Anton',sans-serif; font-size:2rem; color:var(--gabby);">${gabbyAvg}</div>
            <div class="text-muted" style="font-size:0.75rem; text-transform:uppercase; letter-spacing:0.08em;">Avg Score</div>
          </div>
          <div>
            <div style="font-family:'Anton',sans-serif; font-size:2rem; color:var(--gabby);">${gabbyStreak}</div>
            <div class="text-muted" style="font-size:0.75rem; text-transform:uppercase; letter-spacing:0.08em;">Best Streak</div>
          </div>
          <div>
            <div style="font-family:'Anton',sans-serif; font-size:2rem; color:var(--gabby);">${gabbyCurrentStreak > 0 ? gabbyCurrentStreak : '—'}</div>
            <div class="text-muted" style="font-size:0.75rem; text-transform:uppercase; letter-spacing:0.08em;">Current Run</div>
          </div>
        </div>
      </div>
    </div>

    <!-- FULL HISTORY TABLE -->
    <div class="section-title">All Weeks</div>
    ${results.length === 0 ? `
      <div class="empty-state">
        <div style="font-size:3rem; margin-bottom:1rem;">📅</div>
        <div>No completed weeks yet.</div>
        <div class="text-muted mt-1">Lock in the week from the Arena page when you're done.</div>
      </div>
    ` : `
      <div class="card" style="overflow:auto;">
        <table class="history-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Week</th>
              <th style="color:var(--jacob)">Jacob</th>
              <th style="color:var(--gabby)">Gabby</th>
              <th>Margin</th>
              <th>Winner</th>
            </tr>
          </thead>
          <tbody>
            ${results.map((r, i) => {
              const margin = Math.abs(r.jacob_score - r.gabby_score);
              return `
                <tr>
                  <td class="text-muted text-mono" style="font-size:0.8rem;">${results.length - i}</td>
                  <td class="text-muted" style="font-size:0.85rem;">${formatWeekRange(r.week_start)}</td>
                  <td style="font-family:'Space Mono',monospace; font-weight:700; color:${r.winner === 'jacob' ? 'var(--jacob)' : 'var(--text)'};">${r.jacob_score}</td>
                  <td style="font-family:'Space Mono',monospace; font-weight:700; color:${r.winner === 'gabby' ? 'var(--gabby)' : 'var(--text)'};">${r.gabby_score}</td>
                  <td class="text-muted text-mono" style="font-size:0.85rem;">${margin === 0 ? '—' : '+'+margin}</td>
                  <td>
                    ${r.winner === 'jacob' ? '<span class="badge jacob">Jacob 🏆</span>'
                      : r.winner === 'gabby' ? '<span class="badge gabby">Gabby 🏆</span>'
                      : '<span class="badge tie">Tie</span>'}
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    `}
  `;
}

function calcLongestStreaks(results) {
  let jacobBest = 0, gabbyBest = 0;
  let jRun = 0, gRun = 0;
  // Results are newest-first, iterate oldest-first
  [...results].reverse().forEach(r => {
    if (r.winner === 'jacob') { jRun++; gRun = 0; }
    else if (r.winner === 'gabby') { gRun++; jRun = 0; }
    else { jRun = 0; gRun = 0; }
    if (jRun > jacobBest) jacobBest = jRun;
    if (gRun > gabbyBest) gabbyBest = gRun;
  });
  return { jacobStreak: jacobBest, gabbyStreak: gabbyBest };
}

function calcCurrentStreak(results, player) {
  let streak = 0;
  for (const r of results) { // newest first
    if (r.winner === player) streak++;
    else break;
  }
  return streak;
}

render();
</script>
</body>
</html>
